name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, self-hosted ]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - name: Build tools
      run: ./build.sh tools

    - name: Lint
      run: ./build.sh lint

    - name: Build
      run: ./build.sh build

    - name: Test
      run: ./build.sh test

    - name: Test race
      if: matrix.os == 'self-hosted'
      run: ./build.sh test --race

    - name: Bench
      if: matrix.os == 'self-hosted'
      run: ./build.sh bench
