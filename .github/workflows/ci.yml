name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
    
    - name: Build tools
      run: ./build.sh tools
    
    - name: Lint
      run: ./build.sh lint
    
    - name: Build
      run: ./build.sh build
    
    - name: Test
      run: ./build.sh test

    - name: Test race
      run: ./build.sh test --race

    - name: Test on Linux
      if: runner.os != 'Linux'
      run: ./test/test_linux.sh

    - name: Bench
      run: ./build.sh bench
